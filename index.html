<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selena AI Chat</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#0f172a;
color:white;
}

.container{
display:flex;
flex-direction:column;
height:100vh;
max-width:900px;
margin:auto;
}

.header{
padding:16px;
font-size:18px;
font-weight:600;
border-bottom:1px solid #1e293b;
background:#020617;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin-bottom:16px;
display:flex;
}

.user{
justify-content:flex-end;
}

.bubble{
padding:12px 16px;
border-radius:14px;
max-width:70%;
line-height:1.5;
}

.user .bubble{
background:#2563eb;
}

.ai .bubble{
background:#1e293b;
}

.inputArea{
display:flex;
padding:12px;
border-top:1px solid #1e293b;
background:#020617;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
🤖 Selena AI Chat
</div>

<div id="messages" class="messages"></div>

<div class="inputArea">
<input id="input" placeholder="输入消息..." />
<button onclick="send()">发送</button>
</div>

</div>

<script>

const API_KEY="sk-jwlljqhgrgntwfuhaupwqpurfkfpjqkrggnfwxdbpwyztbqe";

let history=[
{role:"system",content:"你是一个温柔、聪明、会聊天的AI伙伴"}
];

const messages=document.getElementById("messages");

function addMessage(role,text){

const div=document.createElement("div");
div.className="message "+role;

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.textContent=text;

div.appendChild(bubble);
messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

}

async function send(){

const input=document.getElementById("input");
const text=input.value.trim();

if(!text) return;

addMessage("user",text);

history.push({role:"user",content:text});

input.value="";

addMessage("ai","思考中...");

const reply=await askAI();

messages.lastChild.remove();

addMessage("ai",reply);

history.push({role:"assistant",content:reply});

localStorage.setItem("chatHistory",JSON.stringify(history));

}

async function askAI(){

try{

const res=await fetch("https://api.deepseek.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({

model:"deepseek-chat",
messages:history

})

});

const data=await res.json();

return data.choices[0].message.content;

}catch(e){

return "AI连接失败，请检查API key";

}

}

document.getElementById("input").addEventListener("keydown",e=>{

if(e.key==="Enter"){
send();
}

});

function loadHistory(){

const saved=localStorage.getItem("chatHistory");

if(!saved) return;

history=JSON.parse(saved);

history.forEach(m=>{

if(m.role==="user") addMessage("user",m.content);
if(m.role==="assistant") addMessage("ai",m.content);

});

}

loadHistory();

</script>

</body>
</html>
